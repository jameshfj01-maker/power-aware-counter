project:
  title:        "Power-Aware Gray Code Counter"
  author:       "James Park"
  discord:      ""
  description:  "8비트 카운터를 이진수 대신 그레이코드로 출력해서, 한 클럭에 딱 1비트만 바뀌게 만든 설계. 스위칭이 몰릴 때 생기는 전력망 노이즈(di/dt)를 줄이기 위한 목적이며, 비교를 위해 원래 이진 카운터 값도 함께 출력한다."
  language:     "Verilog"
  clock_hz:     10000000
  tiles: "1x1"
  top_module:  "tt_um_jameshfj01maker_power_aware_counter"
  source_files:
    - "project.v"

