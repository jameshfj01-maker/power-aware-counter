; Tiny Tapeout 데모보드 부팅 시 자동으로 우리 프로젝트를 선택하는 설정.
; TinyTapeout/tt-micropython-firmware의 실제 기본 src/config.ini를
; GitHub에서 직접 확인해서 그 스키마대로 작성함 (2026-07-20).
; project/mode는 [DEFAULT]에, clock_frequency/ui_in/start_in_reset은
; 프로젝트별 섹션에 둔다 (실제 저장소 예시들과 동일한 구조).

[DEFAULT]
project = tt_um_jameshfj01maker_power_aware_counter
mode = ASIC_RP_CONTROL

[tt_um_jameshfj01maker_power_aware_counter]
clock_frequency = 1000
start_in_reset = no
ui_in = 0
